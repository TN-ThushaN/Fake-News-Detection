<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detector AI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            min-height:100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b, #111827);
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            padding:20px;
        }

        .main-card{
            width:100%;
            max-width:800px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius:25px;
            padding:40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border:1px solid rgba(255,255,255,0.1);
        }

        .title{
            font-size:2.5rem;
            font-weight:700;
            text-align:center;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#cbd5e1;
            margin-bottom:30px;
        }

        textarea{
            background:#0f172a !important;
            color:white !important;
            border:none !important;
            border-radius:15px !important;
            padding:20px !important;
            resize:none;
        }

        textarea::placeholder{
            color:#94a3b8;
        }

        .btn-custom{
            width:100%;
            padding:15px;
            border:none;
            border-radius:15px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            color:white;
            font-size:1.1rem;
            font-weight:600;
            transition:0.3s;
        }

        .btn-custom:hover{
            transform:translateY(-2px);
            opacity:0.9;
        }

        .result-card{
            margin-top:30px;
            background:#111827;
            border-radius:20px;
            padding:25px;
            text-align:center;
            border:1px solid rgba(255,255,255,0.1);
        }

        .prediction{
            font-size:2rem;
            font-weight:700;
        }

        .fake{
            color:#ef4444;
        }

        .real{
            color:#22c55e;
        }

        .confidence{
            margin-top:10px;
            color:#cbd5e1;
            font-size:1.1rem;
        }

        .footer{
            text-align:center;
            margin-top:20px;
            color:#94a3b8;
            font-size:0.9rem;
        }
    </style>
</head>
<body>

<div class="main-card">

    <h1 class="title">📰 Fake News Detector AI</h1>

    <p class="subtitle">
        Detect whether a news article is Real or Fake using Machine Learning & NLP
    </p>

    <form method="POST">

        <div class="mb-4">
            <textarea
                class="form-control"
                name="news"
                rows="10"
                placeholder="Paste your news article or headline here..."
                required
            ></textarea>
        </div>

        <button type="submit" class="btn-custom">
            Analyze News
        </button>

    </form>

    {% if prediction %}

    <div class="result-card">

        <div class="prediction {% if prediction == 'Fake News' %}fake{% else %}real{% endif %}">
            {{ prediction }}
        </div>

        <div class="confidence">
            Confidence: {{ confidence }}%
        </div>

    </div>

    {% endif %}

    <div class="footer">
        Powered by Flask • Scikit-learn • TF-IDF
    </div>

</div>

</body>
</html>
